<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">Diplomat-ai/.github inheritance map</title>
  <desc id="desc">Diagram showing how files in the .github org repo propagate to other Diplomat-ai repositories. SECURITY.md, CONTRIBUTING.md, CODE_OF_CONDUCT.md, SUPPORT.md, FUNDING.yml, ISSUE_TEMPLATE and PULL_REQUEST_TEMPLATE are inherited as fallbacks. dependabot.yml, workflows, CodeQL configs and branch protection do not propagate and must live in each repo.</desc>
