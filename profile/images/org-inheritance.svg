  <text x="600.0" y="38" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" fill="#64748B" text-anchor="middle">ORG-WIDE INHERITANCE</text>
